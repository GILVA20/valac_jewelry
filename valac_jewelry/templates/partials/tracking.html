<script>
  function trackView(productId) {
    const sid = window.VALAC_SESSION_ID || '';
    fetch(`/admin/analytics/t/v/${productId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sid })
    }).catch(() => {});
  }

  function trackNavigation(path) {
    const sid = window.VALAC_SESSION_ID || '';
    fetch('/admin/analytics/t/n', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: path, session_id: sid })
    }).catch(() => {});
  }

  document.addEventListener("DOMContentLoaded", function () {
    {% if product %}
      trackView({{ product.id }});
    {% endif %}

    trackNavigation(window.location.pathname + window.location.search);
  });
</script>
